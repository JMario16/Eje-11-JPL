<div class="container">
    <h1>Mascotas</h1>

    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Datos de la mascota</h5>
            <!--form-->
                <input type="hidden" [(ngModel)] = "mascota.id"/>
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" [(ngModel)] = "mascota.nombre" aria-describedby="Nombre de la mascota">
                </div>
                <div class="mb-3">
                    <label class="form-label">Edad</label>
                    <input type="number" class="form-control" [(ngModel)] = "mascota.edad" aria-describedby="Edad de la mascota">
                </div>
                <button type="button" (click)="guardar()" class="btn btn-success">{{ enEdicion ? 'Editar' : 'Guardar' }}</button>
            <!--/form-->
        </div>
    </div>

    <h1>Lista de mascotas</h1>
    <table class="table table-striped table-hover">
        <thead>
            <tr>
                <th scope="col">id</th>
                <th scope="col">Nombre</th>
                <th scope="col">Edad</th>
                <th scope="col">Acciones</th>
            </tr>
        </thead>
        <tbody>
            @for (mascota of mascotas; track mascota.id) {
                <tr>
                    <th scope="row">{{ mascota.id }}</th>
                    <td>{{ mascota.nombre }}</td>
                    <td>{{ mascota.edad }}</td>
                    <td>
                        <button type="button" style="margin-right: 10px;" class="btn btn-info" (click)="editar(mascota)">Editar</button>
                        <button type="button" class="btn btn-danger" (click)="eliminar(mascota.id)">Eliminar</button>
                    </td>
                </tr>
            }
        </tbody>
    </table>
</div>
