<div class="container">
    <h1>Mascotas</h1>

    <div class="card">
        <div class="card-body">
            <h5 class="card-title">Datos de la mascota</h5>
            <form>
                <input type="hidden"/>
                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" aria-describedby="Nombre de la mascota">
                </div>
                <div class="mb-3">
                    <label class="form-label">Edad</label>
                    <input type="number" class="form-control" aria-describedby="Edad de la mascota">
                </div>
                <button type="button" class="btn btn-success">Guardar</button>
            </form>
        </div>
    </div>

    <h1>Lista de mascotas</h1>
    <table class="table table-striped table-hover">
        <thead>
            <tr>
                <th scope="col">id</th>
                <th scope="col">Nombre</th>
                <th scope="col">Edad</th>
                <th scope="col">Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="row">1</th>
                <td>Maya</td>
                <td>5</td>
                <td><button type="button" style="margin-right: 10px;" class="btn btn-info">Editar</button><button type="button" class="btn btn-danger">Eliminar</button></td>
            </tr>
            <tr>
                <th scope="row">2</th>
                <td>Solovino</td>
                <td>8</td>
                <td><button type="button" style="margin-right: 10px;" class="btn btn-info">Editar</button><button type="button" class="btn btn-danger">Eliminar</button></td>
            </tr>
        </tbody>
    </table>
</div>
